<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Рулетка DOTA1X6</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Inter&family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>DOTA 1x6 <span class="highlight">Roulette</span></h1>
        
        <div class="roulette-container">
            <div class="pointer">▼</div>
            <div class="wheel-shadow"></div>
            <div class="wheel" id="wheel">
                <!-- Segments will be generated by JS -->
            </div>
            <div class="center-piece"></div>
        </div>

        <button id="spin-btn" class="dota-btn">ПРОКРУТИТЬ</button>

        <div class="result-container" id="result-container">
            <h2>Текущее задание:</h2>
            <div id="result-text" class="result-text">Готов к прокрутке...</div>
        </div>

        <div class="history-container">
            <h3>История</h3>
            <ul id="history-list">
                <!-- History items will be added here -->
            </ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
